<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imóveis Rio — Análise de Investimento</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F2ED;
  --surface: #FFFFFF;
  --surface2: #F9F7F4;
  --border: #E4DDD4;
  --border2: #D4CBC0;
  --text: #1C1814;
  --muted: #8A8178;
  --accent: #B5390A;
  --accent-light: #FBF0EC;
  --green: #1E5E2A;
  --green-bg: #EBF5ED;
  --green-border: #B8D9BE;
  --amber: #7A4F00;
  --amber-bg: #FBF5E6;
  --amber-border: #E8D49A;
  --red: #9B2424;
  --red-bg: #FAEBEB;
  --red-border: #F0BCBC;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.5;
}

/* HEADER */
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.app-header h1 {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 1.25rem;
  color: var(--text);
}

.app-header h1 em {
  color: var(--accent);
  font-style: italic;
}

.header-sub {
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 1px;
}

/* SCREENS */
.screen { display: none; min-height: 100vh; padding-bottom: 100px; }
.screen.active { display: block; }

/* LISTA */
.list-container { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem; }

.list-empty {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--muted);
}

.list-empty .empty-icon {
  font-family: 'Fraunces', serif;
  font-size: 3rem;
  color: var(--border2);
  margin-bottom: 1rem;
}

.list-empty p { font-size: 0.9rem; }

.imovel-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 0.75rem;
  box-shadow: var(--shadow);
  transition: border-color 0.15s;
}

.imovel-card:hover { border-color: var(--border2); }

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.75rem;
}

.card-title {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 1.05rem;
  color: var(--text);
}

.card-subtitle {
  font-size: 0.78rem;
  color: var(--muted);
  margin-top: 2px;
}

.card-yield {
  text-align: right;
}

.yield-num {
  font-family: 'Fraunces', serif;
  font-size: 1.4rem;
  font-weight: 300;
  color: var(--text);
  line-height: 1;
}

.yield-label {
  font-size: 0.7rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.card-meta {
  display: flex;
  gap: 1rem;
  margin-bottom: 0.75rem;
  font-size: 0.82rem;
  color: var(--muted);
}

.card-meta strong { color: var(--text); font-weight: 500; }

.card-badge {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 20px;
  margin-bottom: 0.75rem;
}

.badge-green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.badge-amber { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
.badge-red { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

.card-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.btn { font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; padding: 6px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: transparent; color: var(--text); cursor: pointer; transition: all 0.15s; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
.btn:hover { background: var(--surface2); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { opacity: 0.88; background: var(--accent); }
.btn-danger { color: var(--red); border-color: var(--red-border); }
.btn-danger:hover { background: var(--red-bg); }
.btn-ghost { border-color: transparent; color: var(--muted); }
.btn-ghost:hover { color: var(--text); background: var(--surface2); }

/* FAB */
.fab {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 0.85rem 1.5rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(181,57,10,0.35);
  transition: all 0.15s;
  z-index: 200;
}

.fab:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(181,57,10,0.4); }

/* FORM */
.form-container { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem; }

.form-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow);
}

.section-label {
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1rem;
}

.field { margin-bottom: 1rem; }
.field:last-child { margin-bottom: 0; }
.field label { display: block; font-size: 0.78rem; font-weight: 500; color: var(--muted); margin-bottom: 5px; }

.field input, .field select {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  width: 100%;
  padding: 0.65rem 0.85rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, background 0.15s;
}

.field input:focus, .field select:focus {
  border-color: var(--accent);
  background: var(--surface);
}

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

.url-row { display: flex; gap: 8px; }
.url-row input { flex: 1; }

.bairro-novo-aviso {
  display: none;
  background: var(--amber-bg);
  border: 1px solid var(--amber-border);
  border-radius: var(--radius-sm);
  padding: 0.75rem 1rem;
  font-size: 0.82rem;
  color: var(--amber);
  margin-top: 0.5rem;
}

/* CHECKBOX TOGGLE */
.check-row {
  display: flex;
  align-items: center;
  gap: 0.65rem;
  cursor: pointer;
  user-select: none;
}
.check-row input[type=checkbox] {
  width: 17px; height: 17px;
  accent-color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;
}
.check-row span { font-size: 0.88rem; color: var(--text); }
.check-row .check-sub { font-size: 0.75rem; color: var(--muted); }

/* REFORMA SELECTOR */
.reforma-opcoes {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  margin-top: 0.75rem;
}
.reforma-opt {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.75rem 1rem;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: flex-start;
  gap: 0.65rem;
}
.reforma-opt:hover { border-color: var(--border2); background: var(--surface2); }
.reforma-opt.selected { border-color: var(--accent); background: var(--accent-light); }
.reforma-opt input[type=radio] { margin-top: 3px; accent-color: var(--accent); flex-shrink: 0; }
.reforma-opt-label { font-size: 0.88rem; font-weight: 500; color: var(--text); }
.reforma-opt-desc { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
.reforma-opt.selected .reforma-opt-label { color: var(--accent); }

.custo-info {
  display: none;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.75rem 1rem;
  margin-top: 0.75rem;
  font-size: 0.82rem;
  color: var(--muted);
}
.custo-info strong { color: var(--text); }

.collapsible-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  user-select: none;
}

.collapsible-body { display: none; margin-top: 1rem; }
.collapsible-body.open { display: block; }

.chevron { transition: transform 0.2s; font-size: 0.8rem; color: var(--muted); }
.chevron.open { transform: rotate(180deg); }

.form-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 1rem;
}

/* ANÁLISE */
.analise-container { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem; }

.analise-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow);
}

.analise-titulo {
  font-family: 'Fraunces', serif;
  font-size: 1.4rem;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 0.25rem;
}

.analise-sub { font-size: 0.82rem; color: var(--muted); }

.status-banner {
  border-radius: var(--radius-sm);
  padding: 1rem 1.25rem;
  margin-top: 1rem;
  display: flex;
  gap: 0.75rem;
  align-items: center;
}

.status-banner.green { background: var(--green-bg); border: 1px solid var(--green-border); }
.status-banner.amber { background: var(--amber-bg); border: 1px solid var(--amber-border); }
.status-banner.red { background: var(--red-bg); border: 1px solid var(--red-border); }

.status-banner .icon { font-size: 1.5rem; }
.status-banner .text strong { display: block; font-size: 0.9rem; font-weight: 500; }
.status-banner.green .text strong { color: var(--green); }
.status-banner.amber .text strong { color: var(--amber); }
.status-banner.red .text strong { color: var(--red); }
.status-banner .text span { font-size: 0.8rem; color: var(--muted); }

.analise-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow);
}

.analise-section-title {
  font-family: 'Fraunces', serif;
  font-size: 1rem;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--border);
}

/* CENÁRIOS */
.cenarios { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }

.cenario {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 1rem;
  text-align: center;
}

.cenario.destaque { border-color: var(--accent); background: var(--accent-light); }

.cenario-label { font-size: 0.7rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.5rem; }
.cenario.destaque .cenario-label { color: var(--accent); }
.cenario-valor { font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 300; color: var(--text); }
.cenario-m2 { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

/* FINANCIAMENTO */
.fin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

.fin-item { background: var(--surface2); border-radius: var(--radius-sm); padding: 0.85rem 1rem; }
.fin-item-label { font-size: 0.72rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 3px; }
.fin-item-value { font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 300; color: var(--text); }
.fin-item-sub { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }

/* RENDIMENTO */
.rend-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.rend-table th { font-size: 0.72rem; font-weight: 500; color: var(--muted); text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
.rend-table td { padding: 8px; border-bottom: 1px solid var(--surface2); }
.rend-table tr:last-child td { border-bottom: none; }

.rend-cell { display: inline-block; font-size: 0.75rem; font-weight: 500; padding: 2px 8px; border-radius: 12px; }

/* MERCADO */
.mercado-row { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid var(--surface2); font-size: 0.85rem; }
.mercado-row:last-child { border-bottom: none; }
.mercado-row .ml { color: var(--muted); }
.mercado-row .mv { font-weight: 500; }

.range-viz { margin: 0.75rem 0; }
.range-track { position: relative; height: 6px; background: var(--border); border-radius: 3px; }
.range-fill { position: absolute; height: 100%; background: var(--border2); border-radius: 3px; }
.range-dot { position: absolute; width: 12px; height: 12px; border-radius: 50%; top: -3px; transform: translateX(-50%); border: 2px solid white; }
.range-legs { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--muted); margin-top: 4px; }

/* NOTIFICACAO */
.toast {
  position: fixed;
  bottom: 5rem;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: #fff;
  padding: 0.65rem 1.25rem;
  border-radius: 50px;
  font-size: 0.85rem;
  opacity: 0;
  transition: all 0.3s;
  z-index: 999;
  white-space: nowrap;
  pointer-events: none;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* LOADING */
.loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.9rem; }

@media (max-width: 520px) {
  .cenarios { grid-template-columns: 1fr; }
  .fin-grid { grid-template-columns: 1fr; }
  .field-row, .field-row-3 { grid-template-columns: 1fr; }
  .rend-table { font-size: 0.75rem; }
}
</style>
</head>
<body>

<header class="app-header">
  <div>
    <h1>Imóveis <em>Rio</em></h1>
    <div class="header-sub" id="headerSub">carregando...</div>
  </div>
  <div id="headerActions"></div>
</header>

<!-- TELA 1: LISTA -->
<div class="screen active" id="screen-lista">
  <div class="list-container">
    <div class="loading" id="listLoading">Carregando imóveis...</div>
    <div id="listContent" style="display:none"></div>
  </div>
  <button class="fab" onclick="irParaForm()">+ Novo imóvel</button>
</div>

<!-- TELA 2: FORM -->
<div class="screen" id="screen-form">
  <div class="form-container">

    <div class="form-section">
      <div class="section-label">Dados do imóvel</div>

      <div class="field">
        <label>Link do anúncio</label>
        <div class="url-row">
          <input type="url" id="fLink" placeholder="https://www.zapimoveis.com.br/..." oninput="processarLink(this.value)" />
          <a id="fLinkBtn" href="#" target="_blank" class="btn" style="display:none">↗</a>
        </div>
      </div>

      <div class="field-row-3">
        <div class="field">
          <label>Bairro</label>
          <input type="text" id="fBairro" placeholder="Ex: Botafogo" list="bairrosList" oninput="verificarBairro(this.value)" />
          <datalist id="bairrosList"></datalist>
          <div class="bairro-novo-aviso" id="bairroNovoAviso">⚠️ Bairro novo — será adicionado com estimativas aproximadas baseadas na média do mercado do Rio.</div>
        </div>
        <div class="field">
          <label>Área (m²)</label>
          <input type="number" id="fArea" placeholder="70" min="1" />
        </div>
        <div class="field">
          <label>Quartos</label>
          <select id="fQuartos">
            <option value="1">1 / studio</option>
            <option value="2" selected>2 quartos</option>
            <option value="3">3+ quartos</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Preço de compra (R$)</label>
        <input type="number" id="fPreco" placeholder="600000" oninput="atualizarCustoInfo()" />
      </div>
    </div>

    <div class="form-section">
      <div class="section-label">Custos adicionais</div>

      <div class="field">
        <label class="check-row" style="margin-bottom:0">
          <input type="checkbox" id="fImpostos" onchange="atualizarCustoInfo()" />
          <span>Incluir impostos de transferência (ITBI + cartório)<br><span class="check-sub">5% do preço de compra — entra no valor financiado</span></span>
        </label>
      </div>

      <div class="field" style="margin-top:1rem">
        <label>Estimativa de reforma</label>
        <div class="reforma-opcoes">
          <label class="reforma-opt selected" onclick="selecionarReforma(this, 0)">
            <input type="radio" name="reforma" value="0" checked />
            <div>
              <div class="reforma-opt-label">Sem reforma</div>
              <div class="reforma-opt-desc">Imóvel pronto para uso</div>
            </div>
          </label>
          <label class="reforma-opt" onclick="selecionarReforma(this, 250)">
            <input type="radio" name="reforma" value="250" />
            <div>
              <div class="reforma-opt-label">Reforma simples — R$ 250/m²</div>
              <div class="reforma-opt-desc">Pintura, piso, pequenos reparos</div>
            </div>
          </label>
          <label class="reforma-opt" onclick="selecionarReforma(this, 1000)">
            <input type="radio" name="reforma" value="1000" />
            <div>
              <div class="reforma-opt-label">Reforma média — R$ 1.000/m²</div>
              <div class="reforma-opt-desc">Reforma simples + modernizações pontuais</div>
            </div>
          </label>
          <label class="reforma-opt" onclick="selecionarReforma(this, 3000)">
            <input type="radio" name="reforma" value="3000" />
            <div>
              <div class="reforma-opt-label">Reforma estrutural — R$ 3.000/m²</div>
              <div class="reforma-opt-desc">Paredes, elétrica, hidráulica, cozinha e banheiros</div>
            </div>
          </label>
        </div>
        <div class="custo-info" id="custoInfo"></div>
      </div>
    </div>

    <div class="form-section">
      <div class="collapsible-header" onclick="toggleCollapsible()">
        <div class="section-label" style="margin-bottom:0">Parâmetros do financiamento</div>
        <span class="chevron" id="chevron">▼</span>
      </div>
      <div class="collapsible-body" id="collapsibleBody">
        <div class="field-row" style="margin-top:1rem">
          <div class="field">
            <label>Entrada (R$)</label>
            <input type="number" id="fEntrada" value="300000" />
          </div>
          <div class="field">
            <label>Taxa de juros (% a.a.)</label>
            <input type="number" id="fTaxa" value="11.7" step="0.1" />
          </div>
        </div>
        <div class="field">
          <label>Prazo</label>
          <select id="fPrazo">
            <option value="10" selected>10 anos</option>
            <option value="15">15 anos</option>
            <option value="20">20 anos</option>
            <option value="30">30 anos</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn" onclick="irParaLista()">Cancelar</button>
      <button class="btn btn-primary" onclick="calcularEAnalisar()">Calcular análise →</button>
    </div>
  </div>
</div>

<!-- TELA 3: ANÁLISE -->
<div class="screen" id="screen-analise">
  <div class="analise-container" id="analiseContent"></div>
</div>

<div class="toast" id="toast"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCC08OPdkYOYZeZCwGVVtx2Rp3FSUOD37I",
  authDomain: "calculadora-rj.firebaseapp.com",
  projectId: "calculadora-rj",
  storageBucket: "calculadora-rj.firebasestorage.app",
  messagingSenderId: "975501552701",
  appId: "1:975501552701:web:9fde1cf647574a7e9a8e54"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// BASE DE DADOS — Aluguel R$/m² por bairro e tipologia (mai/2026)
const aluguelData = {
  'Botafogo':         { q1:[72,78], q2:[60,65], q3:[55,60], conf:'✅ Alta' },
  'Humaitá':          { q1:[70,75], q2:[60,63], q3:[54,58], conf:'✅ Alta' },

const DFI = 33.24;

window.atualizarCustoInfo = function() {
  const preco = parseFloat(document.getElementById('fPreco').value) || 0;
  const area = parseFloat(document.getElementById('fArea').value) || 0;
  const impostos = document.getElementById('fImpostos').checked;
  const custoInfo = document.getElementById('custoInfo');

  const custoReforma = reformaM2Atual * area;
  const custoImpostos = impostos ? preco * 0.05 : 0;
  const custoTotal = custoReforma + custoImpostos;

  if (custoTotal > 0 && preco > 0) {
    let linhas = [];
    if (custoImpostos > 0) linhas.push(`Impostos: <strong>${brl(custoImpostos)}</strong> (financiado)`);
    if (custoReforma > 0) linhas.push(`Reforma (${area}m² × ${brl(reformaM2Atual)}/m²): <strong>${brl(custoReforma)}</strong> (descontado da entrada)`);
    linhas.push(`Custo total adicional: <strong>${brl(custoTotal)}</strong>`);
    custoInfo.innerHTML = linhas.join('<br>');
    custoInfo.style.display = 'block';
  } else {
    custoInfo.style.display = 'none';
  }
}

function calcSAC(financiado, taxaAnual, meses) {
  const i = Math.pow(1 + taxaAnual / 100, 1/12) - 1;
  const amort = financiado / meses;
  let total = 0;
  let p1, pFinal;
  for (let m = 1; m <= meses; m++) {
    const saldo = financiado - amort * (m - 1);
    const juros = saldo * i;
    const mip = m < meses ? saldo * (MIP_ANUAL / 12) : 0;
    const dfi = m < meses ? DFI : 0;
    const p = amort + juros + mip + dfi + TAC;
    total += p;
    if (m === 1) p1 = p;
    if (m === meses) pFinal = p;
  }
  return { inicial: p1, media: total / meses, final: pFinal, amort };
}

function getAluguel(bairro, qkey, area) {
  const d = aluguelData[bairro] || aluguelData['Maracanã'];
  const range = d[qkey] || d.q2;
  const medio = (range[0] + range[1]) / 2;
  return {
    medio: medio * area,
    min: range[0] * area,
    max: range[1] * area,
    m2medio: medio,
    conf: d.conf
  };
}

function qkey(quartos) {
  return quartos == 1 ? 'q1' : quartos == 3 ? 'q3' : 'q2';
}

async function carregarLista() {
  document.getElementById('listLoading').style.display = 'block';
  document.getElementById('listContent').style.display = 'none';

  try {
    const q = query(collection(db, 'imoveis'));
    const snap = await getDocs(q);
    const imoveis = [];
    snap.forEach(d => imoveis.push({ id: d.id, ...d.data() }));

    // Calcular yield e ordenar
    imoveis.forEach(im => {
      const qk = qkey(im.quartos);
      const al = getAluguel(im.bairro, qk, im.area);
      const custoReforma = im.custoReforma || 0;
      const impostos = im.incluirImpostos ? im.preco * 0.05 : 0;
      const entradaEfetiva = im.entrada - custoReforma;
      const financiado = (im.preco + impostos) - entradaEfetiva;
      const custoTotal = im.preco + impostos + custoReforma;
      const sac = calcSAC(financiado, im.taxa, im.prazo * 12);
      im._yield = (al.medio * 12) / custoTotal * 100;
      im._aluguel = al.medio;
      im._parcela = sac.media;
      im._saldo = al.medio - sac.media;
    });
    imoveis.sort((a, b) => b._yield - a._yield);

    const total = imoveis.length;
    document.getElementById('headerSub').textContent = total === 0 ? 'Nenhum imóvel' : `${total} imóvel${total > 1 ? 'is' : ''} · ordenados por yield`;

    if (imoveis.length === 0) {
      document.getElementById('listContent').innerHTML = `
        <div class="list-empty">
          <div class="empty-icon">⌂</div>
          <p>Nenhum imóvel ainda.<br>Clique em <strong>+ Novo imóvel</strong> para começar.</p>
        </div>`;
    } else {
      document.getElementById('listContent').innerHTML = imoveis.map(im => {
        const saldo = im._saldo;
        const badge = saldo >= 500
          ? '<span class="card-badge badge-green">✓ Cobre o financiamento</span>'
          : saldo >= 0
          ? '<span class="card-badge badge-amber">≈ Margem estreita</span>'
          : '<span class="card-badge badge-red">↓ Não cobre</span>';

        const linkBtn = im.link ? `<a href="${im.link}" target="_blank" class="btn">Ver anúncio ↗</a>` : '';

        return `<div class="imovel-card">
          <div class="card-top">
            <div>
              <div class="card-title">${im.bairro}</div>
              <div class="card-subtitle">${im.area}m² · ${im.quartos == 1 ? '1 quarto' : im.quartos == 3 ? '3+ quartos' : '2 quartos'} · ${brl(im.preco)}</div>
            </div>
            <div class="card-yield">
              <div class="yield-num">${im._yield.toFixed(1)}%</div>
              <div class="yield-label">yield bruto</div>
            </div>
          </div>
          ${badge}
          <div class="card-meta">
            <span>Aluguel est. <strong>${brl(im._aluguel)}/mês</strong></span>
            <span>Parcela média <strong>${brl(im._parcela)}/mês</strong></span>
          </div>
          <div class="card-actions">
            <button class="btn btn-primary" onclick="verAnalise('${im.id}')">Ver análise</button>
            ${linkBtn}
            <button class="btn btn-danger" onclick="apagarImovel('${im.id}')">Apagar</button>
          </div>
        </div>`;
      }).join('');
    }

    document.getElementById('listLoading').style.display = 'none';
    document.getElementById('listContent').style.display = 'block';
  } catch(e) {
    document.getElementById('listLoading').textContent = 'Erro ao carregar. Verifique a conexão.';
  }
}

window.processarLink = function(url) {
  const btn = document.getElementById('fLinkBtn');
  if (url.startsWith('http')) { btn.href = url; btn.style.display = 'inline-flex'; }
  else { btn.style.display = 'none'; }

  // Extrair info da URL
  const lower = url.toLowerCase();
  for (const b of bairrosConhecidos) {
    if (lower.includes(b.toLowerCase().replace(' ', '-')) || lower.includes(b.toLowerCase())) {
      document.getElementById('fBairro').value = b;
      break;
    }
  }
  const m2match = url.match(/(\d+)m/i) || url.match(/(\d+)-m[-_]/i);
  if (m2match && parseInt(m2match[1]) > 20) document.getElementById('fArea').value = m2match[1];

  const qmatch = url.match(/(\d+)-quartos/i) || url.match(/(\d+)quartos/i);
  if (qmatch) {
    const q = parseInt(qmatch[1]);
    document.getElementById('fQuartos').value = q >= 3 ? '3' : q === 1 ? '1' : '2';
  }
}

window.calcularEAnalisar = async function() {
  const bairroInput = document.getElementById('fBairro').value.trim();
  const area = parseFloat(document.getElementById('fArea').value);
  const preco = parseFloat(document.getElementById('fPreco').value);
  const entrada = parseFloat(document.getElementById('fEntrada').value);
  const taxa = parseFloat(document.getElementById('fTaxa').value);
  const prazo = parseInt(document.getElementById('fPrazo').value);
  const quartos = document.getElementById('fQuartos').value;
  const link = document.getElementById('fLink').value.trim();
  const incluirImpostos = document.getElementById('fImpostos').checked;
  const custoReforma = reformaM2Atual * area;

  if (!bairroInput || !area || !preco || !entrada) {
    showToast('Preencha todos os campos obrigatórios'); return;
  }

  const impostos = incluirImpostos ? preco * 0.05 : 0;
  const entradaEfetiva = entrada - custoReforma;

  if (entradaEfetiva <= 0) {
    showToast('Custo da reforma supera o valor de entrada'); return;
  }
  if ((preco + impostos) <= entradaEfetiva) {
    showToast('Entrada deve ser menor que o preço + impostos'); return;
  }

  // Normalizar bairro
  const bairroMatch = bairrosConhecidos.find(b => b.toLowerCase() === bairroInput.toLowerCase());
  const bairro = bairroMatch || bairroInput;

  // Se bairro novo, adicionar com estimativas padrão do Rio
  if (!bairroMatch) {
    aluguelData[bairro] = { q1:[45,55], q2:[40,50], q3:[35,45], conf:'⚠️ Estimado (bairro novo)' };
    vendaData[bairro] = { q1:[9000,12000], q2:[8000,10000], q3:[7000,9000] };
    bairrosConhecidos.push(bairro);
    showToast(`Bairro "${bairro}" adicionado com estimativas aproximadas`);
  }

  const dados = {
    bairro, area, preco, entrada, taxa,
    prazo: parseInt(prazo), quartos: parseInt(quartos), link,
    incluirImpostos, custoReforma, reformaM2: reformaM2Atual
  };

  // Salvar no Firebase
  try {
    const docRef = await addDoc(collection(db, 'imoveis'), { ...dados, criadoEm: new Date().toISOString() });
    imovelAtual = { id: docRef.id, ...dados };
    mostrarAnalise(imovelAtual);
  } catch(e) {
    showToast('Erro ao salvar. Verifique a conexão.');
  }
}

      ${impostos > 0 || custoReforma > 0 ? `
      <div style="margin-top:0.75rem; background:var(--surface2); border-radius:var(--radius-sm); padding:0.75rem 1rem; font-size:0.8rem; color:var(--muted);">
        ${impostos > 0 ? `<div>Impostos (ITBI + cartório): <strong style="color:var(--text)">${brl(impostos)}</strong> — incluídos no financiado</div>` : ''}
        ${custoReforma > 0 ? `<div>Reforma (${im.reformaM2 ? `${brl(im.reformaM2)}/m²` : 'estimada'}): <strong style="color:var(--text)">${brl(custoReforma)}</strong> — descontada da entrada</div>` : ''}
        <div style="margin-top:4px; padding-top:4px; border-top:1px solid var(--border);">Custo total do investimento: <strong style="color:var(--text)">${brl(custoTotalInvestimento)}</strong></div>
      </div>` : ''}
    </div>

    <div class="analise-section">
      <div class="analise-section-title">3. Rendimento estimado</div>
      <table class="rend-table">
        <thead>
          <tr>
            <th>Cenário de aluguel</th>
            <th>vs. Parcela inicial</th>
            <th>vs. Parcela média</th>
            <th>Yield bruto anual</th>
          </tr>
        </thead>
        <tbody>
          ${cenarios.map(c => `
            <tr>
              <td>${c.label}<br><span style="color:var(--muted);font-size:0.75rem">${brl(c.val)}/mês</span></td>
              <td>${rendCell(c.val, sac.inicial)}</td>
              <td>${rendCell(c.val, sac.media)}</td>
              <td><strong>${(c.val * 12 / custoTotalInvestimento * 100).toFixed(1)}%</strong></td>
            </tr>`).join('')}
        </tbody>
      </table>
      ${custoTotalInvestimento > im.preco ? `<div style="margin-top:0.75rem;font-size:0.75rem;color:var(--muted);">Yield calculado sobre custo total: ${brl(custoTotalInvestimento)} (preço + impostos + reforma)</div>` : ''}
    </div>

    <div class="analise-section">
      <div class="analise-section-title">4. Posição no mercado — ${im.bairro}</div>
      <div class="mercado-row">
        <span class="ml">Preço/m² deste imóvel</span>
        <span class="mv">${brlM2(precoM2)}</span>
      </div>
      <div class="mercado-row">
        <span class="ml">Range de venda no bairro (${qtLabel})</span>
        <span class="mv">${brlM2(vRange[0])} – ${brlM2(vRange[1])}</span>
      </div>
      <div class="mercado-row">
        <span class="ml">Posição</span>
        <span class="card-badge ${posicaoBadge}">${posicaoLabel}</span>
      </div>
      <div class="range-viz">
        <div class="range-track">
          <div class="range-fill" style="left:${fillLeft}%;width:${fillWidth}%"></div>
          <div class="range-dot" style="left:${dotPct}%;background:${dotColor}"></div>
        </div>
        <div class="range-legs">
          <span>${brlM2(vRange[0])}</span>
          <span style="color:${dotColor};font-weight:500">▲ ${brlM2(precoM2)}</span>
          <span>${brlM2(vRange[1])}</span>
        </div>
      </div>
      <div class="mercado-row">
        <span class="ml">Confiança dos dados</span>
        <span class="mv">${(aluguelData[im.bairro] || {conf:'estimado'}).conf}</span>
      </div>
    </div>
  `;
}

window.apagarEVoltar = async function(id) {
  if (!confirm('Apagar este imóvel da lista?')) return;
  await deleteDoc(doc(db, 'imoveis', id));
  showToast('Imóvel removido');
  irParaLista();
}

// INIT
preencherDatalist();
carregarLista();

</script>
</body>
</html>
